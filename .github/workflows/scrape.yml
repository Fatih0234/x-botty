name: Scrape Twitter

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Firefox
        uses: browser-actions/setup-firefox@v1

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Download DB from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download latest-db --pattern "twitter.db" --dir data/ || echo "No existing release, starting fresh"

      - name: Run scraper
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HEADLESS: "true"
        run: uv run python src/main.py

      - name: Upload DB to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest-db 2>/dev/null || \
            gh release create latest-db --title "Latest DB" --notes "Persistent SQLite database" --prerelease
          gh release upload latest-db data/twitter.db --clobber
